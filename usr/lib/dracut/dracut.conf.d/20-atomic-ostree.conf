# Ensure the ostree and bootc dracut modules are always included when
# regenerating the initramfs (e.g. in downstream Containerfiles or during
# kernel updates). Without this, a bare `dracut --no-hostonly` call will
# silently omit the ostree module, breaking boot with "Failed to switch root".
# See: https://gitlab.com/fedora/bootc/base-images/-/blob/main/minimal/initramfs.yaml
add_dracutmodules+=" ostree bootc "
